kind = "web"
previewPath = "/"
title = "Fireplace Records"
version = "1.0.0"
id = "artifacts/fireplace-records"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18805

[services.development]
run = "pnpm --filter @workspace/fireplace-records run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fireplace-records", "run", "build" ]
publicDir = "artifacts/fireplace-records/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18805"
BASE_PATH = "/"
